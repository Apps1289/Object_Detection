services:
  - type: web
    name: yolov8-object-detector
    runtime: python
    region: oregon
    plan: starter          # free tier — upgrade to "standard" for GPU/more RAM

    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: YOLO_CONFIG_DIR          # cache weights inside /tmp (writable on Render)
        value: /tmp/ultralytics
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib

    healthCheckPath: /_stcore/health
